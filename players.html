<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Player Stats — OWCStats</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.layout { display: grid; grid-template-columns: 240px 1fr; gap: 20px; align-items: start; }
@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

.sidebar { position: sticky; top: calc(var(--nav-h) + 16px); display: flex; flex-direction: column; gap: 14px; }
.sidebar .panel { padding: 14px 16px; }
.filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 8px; }

/* View tabs */
.view-tabs { display: flex; flex-direction: column; gap: 4px; }
.view-tab {
  padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: left;
}
.view-tab.active { background: var(--accent); color: #08141f; border-color: var(--accent); }
.view-tab:hover:not(.active) { border-color: var(--accent); color: var(--text); background: var(--panel); }

/* Scatter */
#scatter-section { display: block; }
#rankings-section { display: none; }

#scatter-canvas-wrap {
  width: 100%; aspect-ratio: 4/3; position: relative;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
svg#scatter { width: 100%; height: 100%; display: block; }

.dot { cursor: pointer; transition: opacity 0.12s; }
.dot:hover { opacity: 1 !important; }

.tooltip-box {
  position: absolute; pointer-events: none; display: none;
  background: rgba(8,20,31,0.96); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 12px;
  white-space: nowrap; z-index: 50; backdrop-filter: blur(4px);
}

/* Legend */
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Axis selects */
.axis-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
select {
  width: 100%; padding: 6px 8px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--panel2);
  color: var(--text); font-size: 12px; outline: none; cursor: pointer;
}
select:focus { border-color: var(--accent2); }

/* Rankings table */
.rankings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.rankings-grid.single-role { grid-template-columns: 1fr; max-width: 420px; }
@media (max-width: 900px) { .rankings-grid { grid-template-columns: 1fr; } }
.top5-role { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.top5-role h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 10px; }
.top5-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.top5-row:last-child { border-bottom: none; }
.top5-rank { width: 18px; text-align: center; font-weight: 700; color: var(--text-dim); font-size: 11px; flex-shrink: 0; }
.top5-rank.gold { color: var(--accent); }
.top5-logo { width: 20px; height: 20px; border-radius: 50%; object-fit: contain; flex-shrink: 0; background: #122033; }
.top5-player { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.top5-team { color: var(--text-dim); font-size: 10px; }
.top5-val { font-weight: 700; color: var(--accent); margin-left: auto; white-space: nowrap; }

.role-pill {
  display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600;
  border: 1px solid currentColor;
}
.role-Tank { color: #4da6ff; }
.role-DPS { color: #ff6b6b; }
.role-Support { color: #3ddc84; }

/* Rankings metric selector */
.metric-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.metric-btn {
  padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--panel); color: var(--text-dim); font-size: 11px; cursor: pointer;
}
.metric-btn.active { background: var(--panel2); color: var(--text); border-color: var(--accent2); }
</style>
</head>
<body>
<script src="assets/i18n.js"></script>
<script src="assets/nav.js"></script>

<div class="page">
  <div class="hero">
    <h1>Player <span>Stats</span></h1>
  </div>

  <div class="layout">
    <!-- Left: Sidebar controls -->
    <div class="sidebar">
      <!-- View tabs at top -->
      <div class="panel" style="padding:10px 12px">
        <div class="filter-label">View</div>
        <div class="view-tabs">
          <button class="view-tab active" data-view="scatter">📊 Scatter</button>
          <button class="view-tab" data-view="rankings">🏆 Rankings</button>
        </div>
      </div>

      <div class="panel">
        <div class="filter-label">Region</div>
        <div class="tabs" id="region-tabs">
          <button class="tab-btn region-btn active" data-region="Korea">KR</button>
          <button class="tab-btn region-btn active" data-region="NA">NA</button>
          <button class="tab-btn region-btn active" data-region="EMEA">EMEA</button>
        </div>
      </div>

      <div class="panel">
        <div class="filter-label">Role</div>
        <div class="tabs" id="role-tabs">
          <button class="tab-btn active" data-role="All">All</button>
          <button class="tab-btn" data-role="Tank">Tank</button>
          <button class="tab-btn" data-role="DPS">DPS</button>
          <button class="tab-btn" data-role="Support">Support</button>
        </div>
      </div>

      <div class="panel" id="axes-panel">
        <div class="filter-label">Axes</div>
        <div class="axis-row">
          <div>
            <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">X Axis</div>
            <select id="x-axis">
              <option value="dmg_per10">DMG/10</option>
              <option value="heal_per10">Heal/10</option>
              <option value="elim_per10">Elim/10</option>
              <option value="assist_per10">Assist/10</option>
              <option value="death_per10">Deaths/10</option>
              <option value="ed_ratio">E/D Ratio</option>
              <option value="mit_per10">MIT/10</option>
            </select>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Y Axis</div>
            <select id="y-axis">
              <option value="heal_per10">Heal/10</option>
              <option value="dmg_per10">DMG/10</option>
              <option value="elim_per10">Elim/10</option>
              <option value="assist_per10">Assist/10</option>
              <option value="death_per10">Deaths/10</option>
              <option value="ed_ratio">E/D Ratio</option>
              <option value="mit_per10">MIT/10</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="filter-label">Min Minutes</div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="range" id="min-min" min="5" max="200" value="20" style="flex:1;accent-color:var(--accent)">
          <span id="min-min-val" style="font-size:12px;color:var(--accent);width:36px">20m</span>
        </div>
      </div>

      <div class="panel" style="padding:12px 16px">
        <div class="filter-label">Players shown</div>
        <div id="player-count" style="font-size:22px;font-weight:700;color:var(--accent)">—</div>
      </div>
    </div>

    <!-- Right: View-switched content -->
    <div>
      <!-- SCATTER view -->
      <div id="scatter-section">
        <div id="scatter-canvas-wrap">
          <svg id="scatter" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="tooltip-box" id="tooltip"></div>
        </div>
        <div class="legend" id="legend"></div>
      </div>

      <!-- RANKINGS view -->
      <div id="rankings-section">
        <div class="metric-tabs" id="metric-tabs">
          <button class="metric-btn active" data-metric="dmg_per10">DMG/10</button>
          <button class="metric-btn" data-metric="elim_per10">Elim/10</button>
          <button class="metric-btn" data-metric="heal_per10">Heal/10</button>
          <button class="metric-btn" data-metric="assist_per10">Assist/10</button>
          <button class="metric-btn" data-metric="mit_per10">MIT/10</button>
          <button class="metric-btn" data-metric="ed_ratio">E/D</button>
          <button class="metric-btn" data-metric="death_per10">Deaths/10</button>
        </div>
        <div class="rankings-grid" id="rankings-wrap"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const METRIC_LABELS = {
  dmg_per10: 'DMG/10', heal_per10: 'Heal/10', elim_per10: 'Elim/10',
  assist_per10: 'Assist/10', death_per10: 'Deaths/10', ed_ratio: 'E/D Ratio', mit_per10: 'MIT/10',
};
const ROLE_COLORS = { Tank: '#4da6ff', DPS: '#ff6b6b', Support: '#3ddc84' };
const ROLE_DEFAULTS = {
  Tank:    { x: 'dmg_per10', y: 'mit_per10' },
  DPS:     { x: 'dmg_per10', y: 'ed_ratio' },
  Support: { x: 'dmg_per10', y: 'heal_per10' },
  All:     { x: 'dmg_per10', y: 'heal_per10' },
};

// Team logo extension map (slug → ext)
const LOGO_BASE = 'ban-calc/assets/teams/';
const LOGO_EXT = {
  'cheeseburger': 'webp', 'crazy-raccoon': 'png', 'new-era': 'webp',
  'onside-gaming': 'png', 'poker-face': 'svg', 't1': 'png',
  'team-falcons': 'svg', 'zan-esports': 'webp', 'zeta-division': 'png',
  'al-qadsiah': 'png', 'anyone-s-legend': 'png', 'geekay-esports': 'png',
  'team-peps': 'png', 'twisted-minds': 'png', 'virtus-pro': 'png',
  'dallas-fuel': 'png', 'disguised': 'png', 'extinction': 'png',
  'lunex-gaming': 'png', 'spacestation-gaming': 'png', 'team-liquid': 'png',
};

function slugify(name) {
  return name.toLowerCase().replace(/['']/g, '-').replace(/[^a-z0-9-]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}
function logoUrl(team) {
  const slug = slugify(team);
  const ext = LOGO_EXT[slug] || 'png';
  return `${LOGO_BASE}${slug}.${ext}`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let allPlayers = [];
let selectedRegions = new Set(['Korea', 'NA', 'EMEA']);
let currentRole = 'All';
let minMinutes = 20;
let currentView = 'scatter';   // 'scatter' | 'rankings'
let currentMetric = 'dmg_per10';

const PAD = { top: 32, right: 36, bottom: 56, left: 56 };

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch('assets/data/player_stats.json');
  allPlayers = await res.json();
  updateDefaults();
  render();
}

function updateDefaults() {
  const def = ROLE_DEFAULTS[currentRole] || ROLE_DEFAULTS['All'];
  document.getElementById('x-axis').value = def.x;
  document.getElementById('y-axis').value = def.y;
}

function getFiltered() {
  return allPlayers.filter(p => {
    if (selectedRegions.size > 0 && !selectedRegions.has(p.region)) return false;
    if (currentRole !== 'All' && p.role !== currentRole) return false;
    if (p.minutes < minMinutes) return false;
    return true;
  });
}

// ── Render dispatcher ─────────────────────────────────────────────────────────
function render() {
  const players = getFiltered();
  const xKey = document.getElementById('x-axis').value;
  const yKey = document.getElementById('y-axis').value;

  document.getElementById('player-count').textContent = players.length;

  if (currentView === 'scatter') {
    renderScatter(players, xKey, yKey);
    renderLegend();
  } else {
    renderRankings(players);
  }
}

// ── Scatter ───────────────────────────────────────────────────────────────────
const LOGO_SIZE = 22; // px diameter

function renderScatter(players, xKey, yKey) {
  const svg   = document.getElementById('scatter');
  const wrap  = document.getElementById('scatter-canvas-wrap');
  const W = wrap.clientWidth  || 700;
  const H = wrap.clientHeight || 525;

  if (!players.length) { svg.innerHTML = ''; return; }

  const xs = players.map(p => p[xKey]);
  const ys = players.map(p => p[yKey]);
  const xMin = Math.min(...xs) * 0.9,  xMax = Math.max(...xs) * 1.05;
  const yMin = Math.min(...ys) * 0.9,  yMax = Math.max(...ys) * 1.05;

  const scaleX = v => PAD.left + (v - xMin) / (xMax - xMin) * (W - PAD.left - PAD.right);
  const scaleY = v => H - PAD.bottom - (v - yMin) / (yMax - yMin) * (H - PAD.top - PAD.bottom);

  const R = LOGO_SIZE / 2;  // radius

  // Build defs: one clipPath per point
  let defs = `<defs><clipPath id="plot-clip"><rect x="${PAD.left}" y="${PAD.top}" width="${W-PAD.left-PAD.right}" height="${H-PAD.top-PAD.bottom}"/></clipPath>`;
  players.forEach((_, i) => {
    defs += `<clipPath id="lc${i}"><circle r="${R}" cx="0" cy="0"/></clipPath>`;
  });
  defs += `</defs>`;

  let svgContent = defs;

  // Grid lines & axis labels
  const xTicks = 5, yTicks = 5;
  for (let i = 0; i <= xTicks; i++) {
    const v = xMin + (xMax - xMin) * i / xTicks;
    const x = scaleX(v);
    svgContent += `<line x1="${x}" y1="${PAD.top}" x2="${x}" y2="${H-PAD.bottom}" stroke="#1a3a5c" stroke-width="1"/>`;
    svgContent += `<text x="${x}" y="${H-PAD.bottom+14}" text-anchor="middle" fill="#7a9bb5" font-size="10">${v.toFixed(1)}</text>`;
  }
  for (let i = 0; i <= yTicks; i++) {
    const v = yMin + (yMax - yMin) * i / yTicks;
    const y = scaleY(v);
    svgContent += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#1a3a5c" stroke-width="1"/>`;
    svgContent += `<text x="${PAD.left-6}" y="${y+4}" text-anchor="end" fill="#7a9bb5" font-size="10">${v.toFixed(1)}</text>`;
  }
  svgContent += `<text x="${PAD.left+(W-PAD.left-PAD.right)/2}" y="${H-4}" text-anchor="middle" fill="#7a9bb5" font-size="11">${METRIC_LABELS[xKey]}</text>`;
  svgContent += `<text x="13" y="${PAD.top+(H-PAD.top-PAD.bottom)/2}" text-anchor="middle" fill="#7a9bb5" font-size="11" transform="rotate(-90,13,${PAD.top+(H-PAD.top-PAD.bottom)/2})">${METRIC_LABELS[yKey]}</text>`;

  // Logos (clipped to plot area)
  svgContent += `<g clip-path="url(#plot-clip)">`;
  players.forEach((p, i) => {
    const cx = scaleX(p[xKey]);
    const cy = scaleY(p[yKey]);
    const color = ROLE_COLORS[p.role] || '#aaa';
    const url   = logoUrl(p.team);

    // Role-colored outer ring
    svgContent += `<circle cx="${cx}" cy="${cy}" r="${R+2.5}" fill="${color}" fill-opacity="0.25" stroke="${color}" stroke-width="1.5"/>`;
    // Dark background circle (for transparent logos)
    svgContent += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="#0e2135"/>`;
    // Logo image clipped to circle — use transform so clipPath is origin-centred
    svgContent += `<image href="${url}" x="${-R}" y="${-R}" width="${LOGO_SIZE}" height="${LOGO_SIZE}"
      transform="translate(${cx},${cy})" clip-path="url(#lc${i})"
      class="dot" data-i="${i}" preserveAspectRatio="xMidYMid meet"/>`;
    // Player name label below logo
    const label = p.player.length > 12 ? p.player.slice(0, 11) + '…' : p.player;
    svgContent += `<text x="${cx}" y="${cy + R + 11}" text-anchor="middle" fill="${color}"
      font-size="8.5" font-family="inherit" pointer-events="none"
      style="text-shadow:0 0 4px #08141f,0 0 4px #08141f">${label}</text>`;
  });
  svgContent += `</g>`;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = svgContent;

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  svg.querySelectorAll('.dot').forEach(el => {
    el.addEventListener('mouseenter', () => {
      const p = players[+el.dataset.i];
      const color = ROLE_COLORS[p.role] || '#aaa';
      tooltip.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <img src="${logoUrl(p.team)}" style="width:24px;height:24px;border-radius:50%;object-fit:contain;background:#0e2135">
          <div>
            <div style="font-weight:700;font-size:13px;color:${color}">${p.player}</div>
            <div style="color:var(--text-dim);font-size:11px">${p.team} · <span class="role-pill role-${p.role}">${p.role}</span> · ${p.region}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:auto auto;gap:3px 16px;font-size:12px">
          <span style="color:var(--text-dim)">${METRIC_LABELS[xKey]}</span><span style="font-weight:700">${p[xKey]}</span>
          <span style="color:var(--text-dim)">${METRIC_LABELS[yKey]}</span><span style="font-weight:700">${p[yKey]}</span>
          <span style="color:var(--text-dim)">Minutes</span><span>${p.minutes}m</span>
        </div>`;
      tooltip.style.display = 'block';
      const rect   = wrap.getBoundingClientRect();
      const elRect = el.getBoundingClientRect();
      let left = elRect.left - rect.left + 16;
      let top  = elRect.top  - rect.top  - 16;
      const ttW = tooltip.offsetWidth;
      if (left + ttW > wrap.clientWidth - 8) left = elRect.left - rect.left - ttW - 8;
      tooltip.style.left = Math.max(4, left) + 'px';
      tooltip.style.top  = Math.max(4, top)  + 'px';
    });
    el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });
}

function renderLegend() {
  const roles = currentRole === 'All' ? ['Tank', 'DPS', 'Support'] : [currentRole];
  document.getElementById('legend').innerHTML = roles.map(r =>
    `<div class="legend-item"><div class="legend-dot" style="background:${ROLE_COLORS[r]}"></div>${r}</div>`
  ).join('');
}

// ── Rankings ──────────────────────────────────────────────────────────────────
function renderRankings(players) {
  const roles = currentRole === 'All' ? ['Tank', 'DPS', 'Support'] : [currentRole];
  const metric = currentMetric;
  const descending = metric !== 'death_per10';

  const gridClass = roles.length === 1 ? 'rankings-grid single-role' : 'rankings-grid';
  let html = `<div class="${gridClass}">`;
  for (const role of roles) {
    const rp = players.filter(p => p.role === role);
    if (!rp.length) continue;
    const sorted = [...rp].sort((a, b) => descending ? b[metric] - a[metric] : a[metric] - b[metric]).slice(0, 10);
    html += `<div class="top5-role">
      <h3><span class="role-pill role-${role}">${role}</span> — ${METRIC_LABELS[metric]}</h3>
      ${sorted.map((p, i) => `
        <div class="top5-row">
          <div class="top5-rank ${i===0?'gold':''}">${i+1}</div>
          <img class="top5-logo" src="${logoUrl(p.team)}" alt="${p.team}" onerror="this.style.display='none'">
          <div style="min-width:0">
            <div class="top5-player">${p.player}</div>
            <div class="top5-team">${p.team} · ${p.minutes}m</div>
          </div>
          <div class="top5-val">${p[metric]}</div>
        </div>`).join('')}
    </div>`;
  }
  html += '</div>';
  document.getElementById('rankings-wrap').innerHTML = html || '<p style="color:var(--text-dim)">No data.</p>';
}

// ── View switching ────────────────────────────────────────────────────────────
document.querySelectorAll('.view-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentView = btn.dataset.view;
    document.querySelectorAll('.view-tab').forEach(b => b.classList.toggle('active', b === btn));
    document.getElementById('scatter-section').style.display  = currentView === 'scatter'  ? 'block' : 'none';
    document.getElementById('rankings-section').style.display = currentView === 'rankings' ? 'block' : 'none';
    document.getElementById('axes-panel').style.display       = currentView === 'scatter'  ? 'block' : 'none';
    render();
  });
});

// Metric tabs (Rankings)
document.getElementById('metric-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.metric-btn'); if (!btn) return;
  currentMetric = btn.dataset.metric;
  document.querySelectorAll('.metric-btn').forEach(b => b.classList.toggle('active', b === btn));
  if (currentView === 'rankings') render();
});

// Region multi-toggle
document.getElementById('region-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.region-btn'); if (!btn) return;
  const r = btn.dataset.region;
  if (selectedRegions.has(r)) {
    if (selectedRegions.size === 1) return;
    selectedRegions.delete(r);
    btn.classList.remove('active');
  } else {
    selectedRegions.add(r);
    btn.classList.add('active');
  }
  render();
});

// Role
document.getElementById('role-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn'); if (!btn) return;
  currentRole = btn.dataset.role;
  document.querySelectorAll('#role-tabs .tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  updateDefaults();
  render();
});

// Axes
document.getElementById('x-axis').addEventListener('change', render);
document.getElementById('y-axis').addEventListener('change', render);

// Min minutes
document.getElementById('min-min').addEventListener('input', e => {
  minMinutes = +e.target.value;
  document.getElementById('min-min-val').textContent = minMinutes + 'm';
  render();
});

window.addEventListener('resize', () => { if (currentView === 'scatter') render(); });

loadData();
document.addEventListener('langchange', () => { render(); applyI18n(); });
</script>
</body>
</html>
