<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BanCalculatorOW</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #eef1f5;
      --page-bg-2: rgba(255, 255, 255, 0.75);
      --header-bg: rgba(255, 255, 255, 0.94);
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --panel-muted: rgba(244, 247, 250, 0.9);
      --logo-panel: #c9d1d9;
      --text: #11151d;
      --muted: #617082;
      --line: rgba(22, 31, 45, 0.11);
      --shadow: 0 18px 40px rgba(15, 27, 42, 0.12);
      --accent: #ff8f42;
      --accent-strong: #f56d17;
      --green: #2ecc71;
      --red: #ff4d5a;
      --overlay: rgba(10, 14, 20, 0.56);
      --disabled: rgba(12, 16, 24, 0.52);
    }

    body.dark {
      color-scheme: dark;
      --page-bg: #0d1118;
      --page-bg-2: rgba(255, 255, 255, 0.03);
      --header-bg: rgba(10, 12, 18, 0.92);
      --panel: rgba(15, 18, 27, 0.9);
      --panel-strong: rgba(14, 18, 26, 0.95);
      --panel-muted: rgba(29, 35, 47, 0.84);
      --logo-panel: #4a5360;
      --text: #f7f8fb;
      --muted: #a4aebc;
      --line: rgba(255, 255, 255, 0.12);
      --shadow: 0 22px 50px rgba(0, 0, 0, 0.34);
      --accent: #ff9b4b;
      --accent-strong: #ff7a1f;
      --green: #2ed573;
      --red: #ff4757;
      --overlay: rgba(0, 0, 0, 0.6);
      --disabled: rgba(3, 5, 11, 0.62);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(0, 0, 0, 0.05) 0 2px, transparent 2px 100%),
        linear-gradient(145deg, transparent 0 16%, var(--page-bg-2) 16% 20%, transparent 20% 100%),
        linear-gradient(325deg, transparent 0 58%, var(--page-bg-2) 58% 62%, transparent 62% 100%),
        var(--page-bg);
      background-size: 28px 28px, 100% 100%, 100% 100%, auto;
    }

    button,
    input { font: inherit; }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    button:disabled { cursor: not-allowed; }
    .app-shell { min-height: 100vh; }

    .leaderboard {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--header-bg);
      backdrop-filter: blur(14px);
      box-shadow: 0 2px 0 rgba(255, 255, 255, 0.06), 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .leaderboard-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 10px 20px 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 18px;
      align-items: center;
    }

    .team-side {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      min-width: 0;
    }

    .team-side.right {
      grid-template-columns: minmax(0, 1fr) 82px;
      text-align: right;
    }

    .team-logo {
      position: relative;
      width: 82px;
      height: 82px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0)),
        var(--logo-panel);
      flex-shrink: 0;
    }

    .hero-avatar span,
    .ban-trigger-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .lock-toggle {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      background: transparent;
      border: 0;
      color: #8b929b;
      font-size: 14px;
      text-shadow: none;
    }

    .lock-toggle.active { color: #8b929b; }
    .lock-toggle svg {
      width: 14px;
      height: 14px;
      display: block;
      fill: currentColor;
    }
    .team-logo-image,
    .mini-logo-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transform: scale(0.88);
    }

    .mini-logo-image {
      transform: scale(0.9);
    }
    .team-meta { min-width: 0; display: grid; gap: 2px; }
    .team-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .team-name-btn {
      padding: 0;
      text-align: left;
      font-size: clamp(22px, 3vw, 42px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .team-side.right .team-name-btn { text-align: right; }
    .team-name-btn:disabled { opacity: 0.72; }

    .scoreboard {
      display: grid;
      justify-items: center;
      gap: 4px;
      min-width: 210px;
    }

    .format-btn,
    .action-btn,
    .theme-btn,
    .footer-btn {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      box-shadow: var(--shadow);
      font-weight: 800;
    }

    .format-btn {
      min-width: 74px;
      height: 28px;
      padding: 0 14px;
      font-size: 13px;
    }

    .score-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-weight: 900;
    }

    .score-value { font-size: clamp(28px, 3vw, 48px); line-height: 1; }
    .score-vs { font-size: 20px; color: var(--accent-strong); text-transform: uppercase; letter-spacing: 0.06em; }
    .leaderboard-actions { display: flex; gap: 8px; align-items: center; }

    .action-btn {
      min-height: 34px;
      padding: 0 12px;
      font-size: 12px;
      letter-spacing: 0.03em;
    }

    .theme-btn {
      position: absolute;
      top: 14px;
      right: 20px;
      width: 38px;
      height: 38px;
      padding: 0;
      display: grid;
      place-items: center;
      z-index: 21;
    }

    .theme-btn svg {
      width: 16px;
      height: 16px;
      display: block;
      fill: currentColor;
    }

    .content {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 80px;
    }

    .set-list { display: grid; gap: 22px; }
    .set-block { display: grid; gap: 8px; position: relative; }
    .set-label { font-size: 18px; font-weight: 900; letter-spacing: -0.04em; text-transform: uppercase; }

    .set-card {
      position: relative;
      min-height: 136px;
      display: grid;
      grid-template-columns: minmax(170px, 1fr) 64px minmax(180px, max-content) 64px minmax(170px, 1fr);
      align-items: center;
      gap: 10px;
      padding: 20px 22px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0.06)),
        linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0)),
        var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
      isolation: isolate;
    }

    .set-card.mapped::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(90deg, rgba(10, 12, 18, 0.44), rgba(10, 12, 18, 0.18), rgba(10, 12, 18, 0.44)),
        var(--map-image);
      background-size: cover;
      background-position: center;
      opacity: 0.92;
      z-index: -2;
    }

    .set-card.mapped::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.14)),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.08));
      z-index: -1;
    }

    .ban-slot,
    .side-meta,
    .map-slot { min-width: 0; align-content: center; }

    .ban-slot {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ban-slot.left {
      justify-self: stretch;
      justify-content: flex-start;
      text-align: left;
    }

    .ban-slot.right {
      justify-self: stretch;
      justify-content: flex-end;
      text-align: right;
    }
    .side-meta { justify-items: center; }
    .map-slot {
      position: relative;
      display: grid;
      justify-items: center;
      align-items: center;
      min-height: 96px;
    }

    .ban-copy {
      display: grid;
      gap: 4px;
      align-content: center;
      width: 128px;
      flex: 0 0 128px;
    }

    .ban-slot.right .ban-copy {
      order: -1;
      justify-items: end;
      text-align: right;
    }

    .ban-slot.left .ban-copy {
      justify-items: start;
      text-align: left;
    }

    .ban-trigger {
      position: relative;
      width: 78px;
      height: 78px;
      border-radius: 999px;
      border: 3px dashed rgba(255, 143, 66, 0.88);
      background: rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 0 0 5px rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    body.dark .ban-trigger {
      border-color: rgba(255, 255, 255, 0.88);
      background: rgba(255, 255, 255, 0.08);
    }

    .ban-trigger.has-hero { border-style: solid; border-color: rgba(255, 255, 255, 0.72); }
    .ban-trigger::before,
    .hero-avatar::before,
    .mini-logo::before {
      content: "";
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .ban-trigger::before { background-image: var(--hero-image); opacity: 0.96; }
    .hero-avatar::before { background-image: var(--hero-image); }
    .mini-logo::before { background-image: var(--logo-image); }
    .ban-trigger-empty { position: absolute; inset: 0; display: grid; place-items: center; font-size: 28px; }
    .ban-trigger-fallback { font-size: 18px; letter-spacing: 0.02em; }
    .ban-role-label,
    .ban-hero-name { text-shadow: 0 2px 14px rgba(0, 0, 0, 0.3); }
    .ban-role-label { font-size: 18px; font-weight: 800; color: var(--muted); line-height: 1; }
    .set-card.mapped .ban-role-label,
    .set-card.mapped .ban-hero-name,
    .set-card.mapped .map-reset { color: rgba(255, 255, 255, 0.88); }
    .ban-hero-name { font-size: 14px; font-weight: 700; line-height: 1.05; width: 100%; }

    .result-btn {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.68);
      font-size: 28px;
      font-weight: 900;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    body.dark .result-btn { background: rgba(255, 255, 255, 0.12); }
    .result-btn.win { background: var(--green); color: #fff; border-color: transparent; }
    .result-btn.loss { background: var(--red); color: #fff; border-color: transparent; }
    body.dark .result-btn.win { background: var(--green); color: #fff; border-color: transparent; }
    body.dark .result-btn.loss { background: var(--red); color: #fff; border-color: transparent; }

    .map-trigger {
      min-width: min(100%, 320px);
      min-height: 62px;
      padding: 8px 10px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.68);
      box-shadow: var(--shadow);
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 3px;
      text-align: center;
    }

    body.dark .map-trigger { background: rgba(255, 255, 255, 0.12); }
    .set-card.mapped .map-trigger {
      min-height: auto;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
    }

    .map-name { font-size: clamp(15px, 1.4vw, 32px); font-weight: 900; line-height: 0.95; letter-spacing: -0.05em; color: var(--accent); }
    .map-reset {
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .map-reset { font-weight: 800; text-decoration: underline; text-underline-offset: 2px; }

    .series-lock {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      background: var(--disabled);
      backdrop-filter: blur(4px);
      text-align: center;
      padding: 20px;
    }

    .set-card.disabled .series-lock { display: flex; }
    .series-lock strong {
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.42);
      color: #fff;
      font-size: 17px;
      box-shadow: var(--shadow);
    }

    .set-card.disabled button { pointer-events: none; }

    .modal-shell {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--overlay);
      padding: 24px;
    }

    .modal-shell.open { display: flex; }

    .modal {
      width: min(960px, 100%);
      max-height: min(82vh, 900px);
      overflow: auto;
      border-radius: 28px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.28);
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .modal-header,
    .modal-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .modal-title {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .modal-subtitle,
    .footer-note,
    .option-note,
    .hero-copy span {
      color: var(--muted);
    }

    .modal-subtitle { margin-top: 6px; font-size: 14px; }
    .modal-close { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 999px; background: var(--panel-muted); border: 1px solid var(--line); font-size: 20px; font-weight: 900; }
    .search-input { width: 100%; height: 54px; padding: 0 16px; border-radius: 18px; border: 1px solid var(--line); background: var(--panel-muted); color: var(--text); font-size: 15px; font-weight: 600; }

    .team-grid,
    .map-grid,
    .hero-grid,
    .hero-group-list,
    .hero-layout,
    .map-group { display: grid; gap: 12px; }

    .region-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .region-chip {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-muted);
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .region-chip.active {
      color: var(--text);
      border-color: rgba(245, 109, 23, 0.3);
      background: rgba(255, 143, 66, 0.14);
    }

    .team-grid { grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
    .map-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .hero-grid { grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 10px; }
    .hero-group-list { gap: 16px; }

    .team-option,
    .hero-option {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel-muted);
      text-align: left;
    }

    .team-option {
      min-height: 86px;
      padding: 12px;
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .team-option.selected,
    .hero-option.active { outline: 2px solid rgba(245, 109, 23, 0.42); }

    .mini-logo,
    .hero-avatar {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0)), var(--panel);
    }

    .mini-logo { width: 58px; height: 58px; border-radius: 14px; background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0)), var(--logo-panel); }
    .option-name { font-size: 18px; font-weight: 800; line-height: 1; }
    .option-note { margin-top: 4px; font-size: 12px; }
    .map-group h3,
    .hero-group h3 { margin: 0; font-size: 15px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

    .role-heading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .role-icon {
      width: 18px;
      height: 18px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .map-option {
      min-height: 96px;
      padding: 14px;
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--line);
      background-image: linear-gradient(90deg, rgba(10, 12, 18, 0.42), rgba(10, 12, 18, 0.18)), var(--map-image);
      background-size: cover;
      background-position: center;
      color: #fff;
      text-align: left;
    }

    .map-option:disabled,
    .hero-option:disabled { opacity: 0.42; }
    .map-option strong { display: block; font-size: 22px; line-height: 1; letter-spacing: -0.04em; }
    .map-option span { display: block; margin-top: 6px; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
    .rule-box { padding: 14px 16px; border-radius: 20px; background: var(--panel-muted); border: 1px solid var(--line); color: var(--muted); font-size: 13px; line-height: 1.5; }
    .hero-option { min-height: 72px; padding: 10px; display: grid; grid-template-columns: 46px minmax(0, 1fr); gap: 10px; align-items: center; }
    .hero-avatar { width: 46px; height: 46px; border-radius: 999px; }
    .hero-avatar span { font-size: 12px; }
    .hero-copy strong { display: block; font-size: 14px; line-height: 1.1; }
    .hero-copy span { display: block; margin-top: 3px; font-size: 11px; }
    .footer-note { font-size: 13px; }
    .footer-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .footer-btn { min-height: 42px; padding: 0 14px; font-size: 13px; }
    .footer-btn.primary { background: var(--accent-strong); border-color: transparent; color: #fff; }
    .empty-state { padding: 28px 20px; border-radius: 22px; border: 1px dashed var(--line); color: var(--muted); text-align: center; }

    @media (max-width: 980px) {
      .leaderboard-inner { grid-template-columns: 1fr; justify-items: center; text-align: center; }
      .team-side,
      .team-side.right { grid-template-columns: 82px minmax(0, 1fr); width: 100%; text-align: left; }
      .team-side.right .team-name-btn { text-align: left; }
      .theme-btn { top: 12px; right: 12px; }
      .set-card { grid-template-columns: 1fr; justify-items: center; gap: 14px; text-align: center; }
      .ban-slot.left,
      .ban-slot.right,
      .side-meta,
      .map-slot { justify-items: center; text-align: center; }
      .ban-slot,
      .ban-slot.right { justify-content: center; flex-direction: column; }
      .ban-slot.right .ban-copy { order: 0; justify-items: center; text-align: center; }
      .ban-slot.left .ban-copy { justify-items: center; text-align: center; }
      .ban-copy { width: auto; flex: 0 1 auto; }
      .ban-hero-name { max-width: none; }
      .side-meta { order: 2; }
      .map-slot { order: 1; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <button class="theme-btn" id="theme-toggle" type="button" aria-label="Toggle dark mode">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3a9 9 0 1 0 0 18V3Z"/>
        <path d="M12 3a9 9 0 0 1 0 18V3Z" opacity="0.2"/>
        <path d="M12 2a10 10 0 1 0 0 20a10 10 0 0 0 0-20Zm0 18a8 8 0 1 1 0-16v16Z"/>
      </svg>
    </button>
    <header class="leaderboard">
      <div class="leaderboard-inner">
        <div class="team-side" id="team1-side"></div>
        <div class="scoreboard">
          <button class="format-btn" id="format-trigger" type="button">Bo5</button>
          <div class="score-line">
            <span class="score-value" id="score-team1">0</span>
            <span class="score-vs">vs</span>
            <span class="score-value" id="score-team2">0</span>
          </div>
          <div class="leaderboard-actions">
            <button class="action-btn" id="reset-series" type="button">모든 세트 초기화</button>
          </div>
        </div>
        <div class="team-side right" id="team2-side"></div>
      </div>
    </header>

    <main class="content">
      <section class="set-list" id="set-list"></section>
    </main>
  </div>

  <div class="modal-shell" id="modal-shell"></div>

  <script src="./data/shared_owcs_reference.js"></script>
  <script>
    const reference = window.OWCS_REFERENCE || { teams: [], heroes: [], maps: [] };
    const FORMATS = [
      { id: "bo3", label: "Bo3", winsToClinch: 2, visibleSets: 3 },
      { id: "bo5", label: "Bo5", winsToClinch: 3, visibleSets: 5 },
      { id: "bo7", label: "Bo7", winsToClinch: 4, visibleSets: 7 },
    ];
    const ROLE_ORDER = ["Tank", "Damage", "Support"];
    const TEAM_ASSET_ROOT = "./assets/teams";
    const HERO_ASSET_ROOT = "./assets/heroes";
    const MAP_ASSET_ROOT = "./assets/maps";
    const ROLE_ASSET_ROOT = "./assets/roles";
    const TEAM_REGION_GROUPS = {
      All: [
        "Cheeseburger", "Crazy Raccoon", "New Era", "ONSIDE GAMING", "Poker Face", "T1", "Team Falcons", "ZAN Esports", "ZETA DIVISION",
        "99DIVINE", "ENTER FORCE.36", "Lazuli", "Nyam Gaming", "Please Not Hero Ban", "Telomere", "Tokyo Ta1yos", "Varrel",
        "Fury", "MMY", "Quasar Esports", "Rankers", "Team Secret", "The Gatos Guapos",
        "All Gamers", "JDG Gaming", "Milk Tea", "Naive Piggy", "Solus Victorem", "Weibo Gaming",
        "Al Qadsiah", "Anyone's Legend", "Geekay Esports", "Team Peps", "Twisted Mind", "Virtus.pro",
        "Dallas Fuel", "Disguised", "Extinction", "LuneX Gaming", "Spacestation Gaming", "Team Liquid"
      ],
      Korea: ["Cheeseburger", "Crazy Raccoon", "New Era", "ONSIDE GAMING", "Poker Face", "T1", "Team Falcons", "ZAN Esports", "ZETA DIVISION"],
      Japan: ["99DIVINE", "ENTER FORCE.36", "Lazuli", "Nyam Gaming", "Please Not Hero Ban", "Telomere", "Tokyo Ta1yos", "Varrel"],
      Pacific: ["Fury", "MMY", "Quasar Esports", "Rankers", "Team Secret", "The Gatos Guapos"],
      China: ["All Gamers", "JDG Gaming", "Milk Tea", "Naive Piggy", "Solus Victorem", "Weibo Gaming"],
      EMEA: ["Al Qadsiah", "Anyone's Legend", "Geekay Esports", "Team Peps", "Twisted Mind", "Virtus.pro"],
      NA: ["Dallas Fuel", "Disguised", "Extinction", "LuneX Gaming", "Spacestation Gaming", "Team Liquid"],
    };

    const heroByName = new Map(reference.heroes.map((hero) => [hero.hero_name_en, hero]));
    const mapsByMode = reference.maps.reduce((acc, map) => {
      if (!acc[map.map_mode]) acc[map.map_mode] = [];
      acc[map.map_mode].push(map);
      return acc;
    }, {});

    const els = {
      body: document.body,
      team1Side: document.getElementById("team1-side"),
      team2Side: document.getElementById("team2-side"),
      scoreTeam1: document.getElementById("score-team1"),
      scoreTeam2: document.getElementById("score-team2"),
      formatTrigger: document.getElementById("format-trigger"),
      resetSeries: document.getElementById("reset-series"),
      themeToggle: document.getElementById("theme-toggle"),
      setList: document.getElementById("set-list"),
      modalShell: document.getElementById("modal-shell"),
    };

    const state = {
      theme: "light",
      format: "bo5",
      team1: reference.teams[0] || "TEAM 1",
      team2: reference.teams[1] || reference.teams[0] || "TEAM 2",
      lockedTeams: { team1: false, team2: false },
      games: createGames(),
      modal: null,
    };

    function createGames() {
      return Array.from({ length: 7 }, (_, index) => ({
        index,
        map: "",
        winner: "",
        bans: { team1: "", team2: "" },
        banOrder: [],
      }));
    }

    function slugify(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    }

    function initials(value) {
      const words = String(value || "").split(/\s+/).filter(Boolean);
      if (!words.length) return "T";
      return words.slice(0, 2).map((word) => word[0]).join("").toUpperCase();
    }

    function formatMeta() {
      return FORMATS.find((format) => format.id === state.format) || FORMATS[1];
    }

    function visibleGames() {
      return state.games.slice(0, formatMeta().visibleSets);
    }

    function getSeriesState() {
      let team1Wins = 0;
      let team2Wins = 0;
      let winnerSlot = "";
      let clinchIndex = -1;

      visibleGames().forEach((game, index) => {
        if (clinchIndex !== -1) return;
        if (game.winner === "team1") team1Wins += 1;
        if (game.winner === "team2") team2Wins += 1;
        if (team1Wins >= formatMeta().winsToClinch || team2Wins >= formatMeta().winsToClinch) {
          winnerSlot = team1Wins > team2Wins ? "team1" : "team2";
          clinchIndex = index;
        }
      });

      return { team1Wins, team2Wins, winnerSlot, clinchIndex };
    }

    function isGameDisabled(index) {
      const series = getSeriesState();
      return series.clinchIndex !== -1 && index > series.clinchIndex;
    }

    function teamName(slot) {
      return state[slot];
    }

    function getOtherSlot(slot) {
      return slot === "team1" ? "team2" : "team1";
    }

    function teamAsset(slot) {
      return `${TEAM_ASSET_ROOT}/${slugify(teamName(slot))}`;
    }

    function heroAsset(heroName) {
      return `${HERO_ASSET_ROOT}/${slugify(heroName)}.png`;
    }

    function mapAsset(mapName) {
      const slug = slugify(mapName);
      return `image-set(url('${MAP_ASSET_ROOT}/${slug}.webp') type('image/webp'), url('${MAP_ASSET_ROOT}/${slug}.jpg') type('image/jpeg'), url('${MAP_ASSET_ROOT}/${slug}.png') type('image/png'))`;
    }

    function roleAsset(roleName) {
      return `${ROLE_ASSET_ROOT}/${slugify(roleName)}.webp`;
    }

    function teamLogoImg(basePath, altText, className = "team-logo-image") {
      return `<img class="${className}" src="${basePath}.svg" alt="${altText}" onerror="if(this.dataset.fallback==='webp'){this.onerror=null;this.src='${basePath}.png';}else{this.dataset.fallback='webp';this.src='${basePath}.webp';}">`;
    }

    function mapMode(mapName) {
      return reference.maps.find((map) => map.map_name === mapName)?.map_mode || "";
    }

    function getBanMeta(game) {
      const first = game.banOrder[0] || "";
      const second = game.banOrder[1] || "";
      return {
        team1: first === "team1" ? "Initial Ban" : second === "team1" ? "Follow-up Ban" : "",
        team2: first === "team2" ? "Initial Ban" : second === "team2" ? "Follow-up Ban" : "",
      };
    }

    function ownPreviousBans(slot, gameIndex) {
      const picks = [];
      visibleGames().forEach((game, index) => {
        if (index >= gameIndex) return;
        if (game.bans[slot]) picks.push(game.bans[slot]);
      });
      return picks;
    }

    function usedMapsExcept(gameIndex) {
      const used = new Set();
      visibleGames().forEach((game, index) => {
        if (index !== gameIndex && game.map) used.add(game.map);
      });
      return used;
    }

    function scoreSearch(query, candidate) {
      const normalizedQuery = query.trim().toLowerCase();
      const normalizedCandidate = candidate.toLowerCase();
      if (!normalizedQuery) return 1;
      if (normalizedCandidate === normalizedQuery) return 200;
      if (normalizedCandidate.startsWith(normalizedQuery)) return 130 - (normalizedCandidate.length - normalizedQuery.length);
      if (normalizedCandidate.includes(normalizedQuery)) return 90 - normalizedCandidate.indexOf(normalizedQuery);
      let score = 0;
      let cursor = 0;
      for (const char of normalizedQuery) {
        const found = normalizedCandidate.indexOf(char, cursor);
        if (found === -1) return -1;
        score += 10;
        if (found === cursor) score += 6;
        cursor = found + 1;
      }
      return score;
    }

    function resetAllSets() {
      state.games = createGames();
      closeModal();
      render();
    }

    function setFormat(nextFormat) {
      if (state.format === nextFormat) {
        closeModal();
        return;
      }
      state.format = nextFormat;
      resetAllSets();
    }

    function setTeam(slot, team) {
      const otherSlot = getOtherSlot(slot);
      if (!team || team === state[otherSlot]) return;
      state[slot] = team;
      closeModal();
      render();
    }

    function toggleTeamLock(slot) {
      state.lockedTeams[slot] = !state.lockedTeams[slot];
      render();
    }

    function clearSet(index) {
      state.games[index] = {
        index,
        map: "",
        winner: "",
        bans: { team1: "", team2: "" },
        banOrder: [],
      };
      closeModal();
      render();
    }

    function setMap(index, mapName) {
      state.games[index].map = mapName;
      closeModal();
      render();
    }

    function updateBanOrder(game, slot, hasSelection) {
      game.banOrder = game.banOrder.filter((item) => item !== slot);
      if (hasSelection) game.banOrder.push(slot);
    }

    function clearBan(index, slot) {
      const game = state.games[index];
      game.bans[slot] = "";
      updateBanOrder(game, slot, false);
      closeModal();
      render();
    }

    function canPickHero(index, slot, heroName) {
      const hero = heroByName.get(heroName);
      if (!hero) return false;
      const game = state.games[index];
      const otherSlot = getOtherSlot(slot);
      const otherHero = heroByName.get(game.bans[otherSlot]);
      const previousOwnBans = ownPreviousBans(slot, index);
      if (previousOwnBans.includes(heroName)) return false;
      if (otherHero && otherHero.main_role_en === hero.main_role_en) return false;
      return true;
    }

    function setBan(index, slot, heroName) {
      const game = state.games[index];
      if (game.bans[slot] === heroName) {
        clearBan(index, slot);
        return;
      }
      if (!canPickHero(index, slot, heroName)) return;
      game.bans[slot] = heroName;
      if (!game.banOrder.includes(slot)) game.banOrder.push(slot);
      closeModal();
      render();
    }

    function setWinner(index, slot) {
      const game = state.games[index];
      if (!game.map || isGameDisabled(index)) return;
      game.winner = game.winner === slot ? "" : slot;
      render();
    }

    function openTeamModal(slot) {
      if (state.lockedTeams[slot]) return;
      state.modal = { type: "team", slot, query: "", region: "All" };
      render();
      const input = document.getElementById("team-search-input");
      if (input) input.focus();
    }

    function openFormatModal() {
      state.modal = { type: "format" };
      render();
    }

    function openMapModal(gameIndex) {
      if (isGameDisabled(gameIndex)) return;
      state.modal = { type: "map", gameIndex };
      render();
    }

    function openHeroModal(gameIndex, slot) {
      if (isGameDisabled(gameIndex)) return;
      state.modal = { type: "hero", gameIndex, slot };
      render();
    }

    function closeModal() {
      state.modal = null;
      renderModal();
    }

    function renderTeamSide(slot) {
      const side = slot === "team1" ? els.team1Side : els.team2Side;
      const right = slot === "team2";
      const locked = state.lockedTeams[slot];
      side.className = right ? "team-side right" : "team-side";
      side.innerHTML = `
        ${right ? `
          <div class="team-meta">
            <div class="team-label">${slot === "team1" ? "Team 1" : "Team 2"}</div>
            <button class="team-name-btn" data-action="open-team" data-slot="${slot}" type="button"${locked ? " disabled" : ""}>${teamName(slot)}</button>
          </div>
        ` : ""}
        <div class="team-logo">
          ${teamLogoImg(teamAsset(slot), teamName(slot))}
          <button class="lock-toggle${locked ? " active" : ""}" data-action="toggle-lock" data-slot="${slot}" type="button" aria-label="Toggle team lock">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-6 0V7a2 2 0 1 1 4 0v2h-4Z"/>
            </svg>
          </button>
        </div>
        ${right ? "" : `
          <div class="team-meta">
            <div class="team-label">${slot === "team1" ? "Team 1" : "Team 2"}</div>
            <button class="team-name-btn" data-action="open-team" data-slot="${slot}" type="button"${locked ? " disabled" : ""}>${teamName(slot)}</button>
          </div>
        `}
      `;
    }

    function renderSetList() {
      const series = getSeriesState();
      els.setList.innerHTML = "";
      visibleGames().forEach((game, index) => {
        const disabled = isGameDisabled(index);
        const winnerName = series.winnerSlot ? teamName(series.winnerSlot) : "";
        const banMeta = getBanMeta(game);
        const mapSelected = Boolean(game.map);
        const mapLabel = game.map || "Select Map";
        const team1Hero = game.bans.team1;
        const team2Hero = game.bans.team2;

        const block = document.createElement("article");
        block.className = "set-block";
        block.innerHTML = `
          <div class="set-label">Set ${index + 1}</div>
          <div class="set-card${mapSelected ? " mapped" : ""}${disabled ? " disabled" : ""}" style="--map-image:${mapAsset(game.map)}">
            <div class="ban-slot left">
              <button class="ban-trigger${team1Hero ? " has-hero" : ""}" data-action="open-hero" data-index="${index}" data-slot="team1" type="button" style="--hero-image:url('${team1Hero ? heroAsset(team1Hero) : ""}')">
                ${team1Hero ? `` : `<div class="ban-trigger-empty">+</div>`}
              </button>
              ${team1Hero ? `
                <div class="ban-copy">
                  <div class="ban-hero-name">${team1Hero}</div>
                  <div class="ban-role-label">${banMeta.team1}</div>
                </div>
              ` : ``}
            </div>
            <div class="side-meta">
              <button class="result-btn${game.winner === "team1" ? " win" : game.winner === "team2" ? " loss" : ""}" data-action="set-winner" data-index="${index}" data-slot="team1" type="button"${!mapSelected || disabled ? " disabled" : ""}>${game.winner === "team2" ? "L" : "W"}</button>
            </div>
            <div class="map-slot">
              <button class="map-trigger" data-action="open-map" data-index="${index}" type="button">
                <div class="map-name">${mapLabel}</div>
              </button>
              <button class="map-reset" data-action="clear-set" data-index="${index}" type="button"${disabled ? " disabled" : ""}>세트 초기화</button>
            </div>
            <div class="side-meta">
              <button class="result-btn${game.winner === "team2" ? " win" : game.winner === "team1" ? " loss" : ""}" data-action="set-winner" data-index="${index}" data-slot="team2" type="button"${!mapSelected || disabled ? " disabled" : ""}>${game.winner === "team1" ? "L" : "W"}</button>
            </div>
            <div class="ban-slot right">
              ${team2Hero ? `
                <div class="ban-copy">
                  <div class="ban-hero-name">${team2Hero}</div>
                  <div class="ban-role-label">${banMeta.team2}</div>
                </div>
              ` : ``}
              <button class="ban-trigger${team2Hero ? " has-hero" : ""}" data-action="open-hero" data-index="${index}" data-slot="team2" type="button" style="--hero-image:url('${team2Hero ? heroAsset(team2Hero) : ""}')">
                ${team2Hero ? `` : `<div class="ban-trigger-empty">+</div>`}
              </button>
            </div>
            <div class="series-lock"><strong>${winnerName} Win</strong></div>
          </div>
        `;
        els.setList.appendChild(block);
      });
    }

    function renderTeamModal() {
      const { slot, query, region } = state.modal;
      const otherSlot = getOtherSlot(slot);
      const scopedTeams = TEAM_REGION_GROUPS[region] || TEAM_REGION_GROUPS.All;
      const matches = scopedTeams
        .filter((team) => team !== state[otherSlot])
        .map((team) => ({ team, score: scoreSearch(query, team) }))
        .filter((item) => item.score >= 0)
        .sort((a, b) => b.score - a.score || a.team.localeCompare(b.team))
        .map((item) => item.team);

      return `
        <div class="modal">
          <div class="modal-header">
            <div>
              <h2 class="modal-title">Choose ${slot === "team1" ? "Team 1" : "Team 2"}</h2>
            </div>
            <button class="modal-close" data-action="close-modal" type="button">×</button>
          </div>
          <div class="region-filter">
            ${Object.keys(TEAM_REGION_GROUPS).map((regionName) => `
              <button class="region-chip${region === regionName ? " active" : ""}" data-action="select-region" data-region="${regionName}" type="button">${regionName}</button>
            `).join("")}
          </div>
          <input class="search-input" id="team-search-input" data-action="team-query" type="text" placeholder="Search team name..." value="${query}">
          <div class="team-grid">
            ${matches.length ? matches.map((team) => `
              <button class="team-option${state[slot] === team ? " selected" : ""}" data-action="select-team" data-slot="${slot}" data-team="${team}" type="button">
                <div class="mini-logo">${teamLogoImg(`${TEAM_ASSET_ROOT}/${slugify(team)}`, team, "mini-logo-image")}</div>
                <div>
                  <div class="option-name">${team}</div>
                  <div class="option-note">${state[slot] === team ? "Selected" : ""}</div>
                </div>
              </button>
            `).join("") : `<div class="empty-state">No matching teams found.</div>`}
          </div>
        </div>
      `;
    }

    function renderFormatModal() {
      return `
        <div class="modal">
          <div class="modal-header">
            <div>
              <h2 class="modal-title">Choose Series Format</h2>
            </div>
            <button class="modal-close" data-action="close-modal" type="button">×</button>
          </div>
          <div class="team-grid">
            ${FORMATS.map((format) => `
              <button class="team-option${state.format === format.id ? " selected" : ""}" data-action="select-format" data-format="${format.id}" type="button">
                <div>
                  <div class="option-name">${format.label}</div>
                  <div class="option-note">${format.visibleSets} Sets</div>
                </div>
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderMapModal() {
      const { gameIndex } = state.modal;
      const usedMaps = usedMapsExcept(gameIndex);
      return `
        <div class="modal">
          <div class="modal-header">
            <div>
              <h2 class="modal-title">Choose Map for Set ${gameIndex + 1}</h2>
            </div>
            <button class="modal-close" data-action="close-modal" type="button">×</button>
          </div>
          ${Object.entries(mapsByMode).map(([mode, maps]) => `
            <div class="map-group">
              <h3>${mode}</h3>
              <div class="map-grid">
                ${maps.map((map) => `
                  <button class="map-option" data-action="select-map" data-index="${gameIndex}" data-map="${map.map_name}" type="button" style="--map-image:${mapAsset(map.map_name)}"${usedMaps.has(map.map_name) ? " disabled" : ""}>
                    <strong>${map.map_name}</strong>
                    <span>${usedMaps.has(map.map_name) ? "Used" : mode}</span>
                  </button>
                `).join("")}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderHeroModal() {
      const { gameIndex, slot } = state.modal;
      const game = state.games[gameIndex];
      const currentHero = game.bans[slot];

      return `
        <div class="modal">
          <div class="modal-header">
            <div>
              <h2 class="modal-title">${teamName(slot)} Ban for Set ${gameIndex + 1}</h2>
            </div>
            <button class="modal-close" data-action="close-modal" type="button">×</button>
          </div>
          <div class="hero-layout">
            <div class="hero-group-list">
              ${ROLE_ORDER.map((role) => `
                <section class="hero-group">
                  <h3 class="role-heading"><img class="role-icon" src="${roleAsset(role)}" alt="" onerror="this.style.display='none'"><span>${role}</span></h3>
                  <div class="hero-grid">
                    ${reference.heroes.filter((hero) => hero.main_role_en === role).map((hero) => {
                      const selected = currentHero === hero.hero_name_en;
                      const disabled = !selected && !canPickHero(gameIndex, slot, hero.hero_name_en);
                      return `
                        <button class="hero-option${selected ? " active" : ""}" data-action="select-hero" data-index="${gameIndex}" data-slot="${slot}" data-hero="${hero.hero_name_en}" type="button"${disabled ? " disabled" : ""}>
                          <div class="hero-avatar" style="--hero-image:url('${heroAsset(hero.hero_name_en)}')"></div>
                          <div class="hero-copy">
                            <strong>${hero.hero_name_en}</strong>
                            <span>${selected ? "Tap to clear this ban" : hero.hero_name_ko}</span>
                          </div>
                        </button>
                      `;
                    }).join("")}
                  </div>
                </section>
              `).join("")}
            </div>
          </div>
          <div class="modal-footer">
            <div class="footer-note"></div>
            <div class="footer-actions">
              ${currentHero ? `<button class="footer-btn" data-action="clear-ban" data-index="${gameIndex}" data-slot="${slot}" type="button">Clear Ban</button>` : ""}
              <button class="footer-btn primary" data-action="close-modal" type="button">Done</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderModal() {
      if (!state.modal) {
        els.modalShell.classList.remove("open");
        els.modalShell.innerHTML = "";
        return;
      }
      if (state.modal.type === "team") els.modalShell.innerHTML = renderTeamModal();
      if (state.modal.type === "format") els.modalShell.innerHTML = renderFormatModal();
      if (state.modal.type === "map") els.modalShell.innerHTML = renderMapModal();
      if (state.modal.type === "hero") els.modalShell.innerHTML = renderHeroModal();
      els.modalShell.classList.add("open");
    }

    function render() {
      els.body.classList.toggle("dark", state.theme === "dark");
      els.formatTrigger.textContent = formatMeta().label;
      const series = getSeriesState();
      els.scoreTeam1.textContent = String(series.team1Wins);
      els.scoreTeam2.textContent = String(series.team2Wins);
      renderTeamSide("team1");
      renderTeamSide("team2");
      renderSetList();
      renderModal();
    }

    document.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const { action } = target.dataset;
      if (action === "open-team") openTeamModal(target.dataset.slot);
      if (action === "toggle-lock") toggleTeamLock(target.dataset.slot);
      if (action === "open-map") openMapModal(Number(target.dataset.index));
      if (action === "open-hero") openHeroModal(Number(target.dataset.index), target.dataset.slot);
      if (action === "set-winner") setWinner(Number(target.dataset.index), target.dataset.slot);
      if (action === "clear-set") clearSet(Number(target.dataset.index));
      if (action === "select-team") setTeam(target.dataset.slot, target.dataset.team);
      if (action === "select-region" && state.modal?.type === "team") {
        state.modal.region = target.dataset.region;
        renderModal();
      }
      if (action === "select-format") setFormat(target.dataset.format);
      if (action === "select-map") setMap(Number(target.dataset.index), target.dataset.map);
      if (action === "select-hero") setBan(Number(target.dataset.index), target.dataset.slot, target.dataset.hero);
      if (action === "clear-ban") clearBan(Number(target.dataset.index), target.dataset.slot);
      if (action === "close-modal") closeModal();
    });

    document.addEventListener("input", (event) => {
      if (event.target.dataset.action === "team-query" && state.modal?.type === "team") {
        state.modal.query = event.target.value;
        renderModal();
        const input = document.getElementById("team-search-input");
        if (input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }
    });

    els.formatTrigger.addEventListener("click", openFormatModal);
    els.resetSeries.addEventListener("click", resetAllSets);
    els.themeToggle.addEventListener("click", () => {
      state.theme = state.theme === "dark" ? "light" : "dark";
      render();
    });

    els.modalShell.addEventListener("click", (event) => {
      if (event.target === els.modalShell) closeModal();
    });

    render();
  </script>
</body>
</html>
