<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teams — OWCStats</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
.teams-layout {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 20px;
  align-items: start;
}
@media (max-width: 900px) {
  .teams-layout { grid-template-columns: 1fr; }
  .region-nav { position: static !important; }
}

/* Left region nav */
.region-nav {
  position: sticky;
  top: calc(var(--nav-h) + 16px);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.region-nav-header {
  padding: 10px 14px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
}
.region-nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  transition: all 0.1s;
  border-left: 3px solid transparent;
}
.region-nav-item:last-child { border-bottom: none; }
.region-nav-item:hover { background: var(--panel2); color: var(--text); }
.region-nav-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: rgba(245,165,36,0.07);
  font-weight: 700;
}
.region-nav-item .team-count {
  margin-left: auto;
  font-size: 11px;
  background: var(--panel2);
  padding: 1px 6px;
  border-radius: 10px;
  color: var(--text-dim);
}
.region-nav-item.active .team-count {
  background: rgba(245,165,36,0.2);
  color: var(--accent);
}

/* Team grid */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin-top: 16px;
}
.team-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.team-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.team-card .card-logo { text-align: center; margin-bottom: 4px; }
.team-logo-img { width: 52px; height: 52px; object-fit: contain; display: block; margin: 0 auto; }
.team-card .card-name { font-weight: 700; font-size: 14px; line-height: 1.3; }
.team-card .card-elo { font-size: 20px; font-weight: 700; color: var(--accent); }
.team-card .card-rank { font-size: 11px; color: var(--text-dim); }
.team-card .card-record { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.team-card .card-seasons { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.season-pip {
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 3px; background: var(--panel2); color: var(--text-dim);
}

/* Team detail */
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--accent); font-size: 13px; cursor: pointer; margin-bottom: 16px;
  font-weight: 600;
}
.detail-back:hover { text-decoration: underline; }

.team-header-bar {
  display: flex; align-items: center; gap: 16px; padding: 20px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px;
}
.team-header-icon { font-size: 40px; }
.team-header-info h2 { font-size: 22px; font-weight: 700; margin: 0 0 6px; }
.season-elo-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.season-elo-badge {
  background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 12px; text-align: center;
}
.season-elo-badge .yr { font-size: 10px; color: var(--text-dim); display: block; }
.season-elo-badge .elo { font-size: 16px; font-weight: 700; color: var(--accent); display: block; }
.season-elo-badge .rank { font-size: 10px; color: var(--text-dim); display: block; }

.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
}
@media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }

.panel-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-dim); padding: 12px 16px 8px; border-bottom: 1px solid var(--border);
}
.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 13px;
}
.stat-row:last-child { border-bottom: none; }
.stat-row .lbl { color: var(--text-dim); }
.stat-row .val { font-weight: 600; }

/* Roster */
.roster-table { width: 100%; border-collapse: collapse; }
.roster-table th { font-size: 10px; text-transform: uppercase; color: var(--text-dim); padding: 6px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.roster-table td { padding: 9px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
.roster-table tr:last-child td { border-bottom: none; }
.role-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.role-Tank    { background: rgba(77,166,255,0.15); color: #4da6ff; }
.role-Support { background: rgba(61,220,132,0.15); color: #3ddc84; }
.role-Damage  { background: rgba(255,92,92,0.15);  color: #ff5c5c; }

/* Ban bars */
.ban-row { display: flex; align-items: center; gap: 10px; padding: 7px 16px; border-bottom: 1px solid var(--border); }
.ban-row:last-child { border-bottom: none; }
.ban-hero { min-width: 120px; font-size: 13px; font-weight: 500; }
.ban-bar-wrap { flex: 1; height: 8px; background: var(--panel2); border-radius: 4px; overflow: hidden; }
.ban-bar-fill { height: 100%; border-radius: 4px; }
.ban-count { min-width: 26px; text-align: right; font-size: 12px; color: var(--text-dim); font-weight: 600; }

/* Chart */
.chart-container { height: 220px; position: relative; }

/* Region section header in grid view */
.region-section-title {
  font-size: 13px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin: 20px 0 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}

/* Year tabs inside left nav */
.year-tabs {
  display: flex;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
}
.year-tab {
  flex: 1; text-align: center;
  padding: 9px 2px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; color: var(--text-dim);
  transition: all 0.1s;
  border-bottom: 2px solid transparent;
}
.year-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(245,165,36,0.06); }
.year-tab:hover:not(.active) { color: var(--text); }

/* Detail header logo */
.team-header-logo { width: 56px; height: 56px; object-fit: contain; flex-shrink: 0; }
</style>
</head>
<body>
<script src="assets/nav.js"></script>

<div class="page">
  <div class="hero" style="padding-bottom:16px;">
    <h1>OWCS <span>Teams</span></h1>
    <p>지역별 팀 프로필 — ELO 이력, 로스터, 밴 통계</p>
  </div>

  <div class="teams-layout">
    <!-- Left: Region nav -->
    <div class="region-nav" id="region-nav">
      <div class="region-nav-header">Region</div>
      <!-- populated by JS -->
    </div>

    <!-- Right: Team grid or detail -->
    <div id="main-area"></div>
  </div>
</div>

<script>
const REGION_ORDER = ['EMEA','NA','Korea','Japan','Pacific','China'];
const REGION_ICONS = { EMEA:'🌍', NA:'🌎', Korea:'🇰🇷', Japan:'🇯🇵', Pacific:'🌊', China:'🇨🇳' };

// Stage groups — same as elo.html, used to bucket per-event history into stage labels
const STAGE_GROUPS = {
  '2024': [
    { label: "'24 S1",    events: ['owcs_2024_emea_s1_groups','owcs_2024_emea_s1_main','owcs_2024_na_s1_groups','owcs_2024_na_s1_main','owcs_2024_asia_s1_korea','owcs_2024_asia_s1_japan','owcs_2024_asia_s1_pacific','owcs_2024_asia_s1_wildcard','owcs_2024_asia_s1_main','ewc_2024'] },
    { label: "'24 S2",    events: ['owcs_2024_emea_s2_groups','owcs_2024_emea_s2_main','owcs_2024_emea_s3_groups','owcs_2024_emea_s3_main','owcs_2024_na_s2_groups','owcs_2024_na_s2_main','owcs_2024_na_s3_groups','owcs_2024_na_s3_main','owcs_2024_asia_s2_korea','owcs_2024_asia_s2_japan','owcs_2024_asia_s2_pacific','owcs_2024_asia_s2_wildcard','owcs_2024_dallas_major'] },
    { label: "'24 S3/S4", events: ['owcs_2024_emea_s4_groups','owcs_2024_emea_s4_main','owcs_2024_na_s4_groups','owcs_2024_na_s4_main','owcs_2024_asia_s2_main'] },
    { label: "'24 WF",    events: ['owcs_2024_world_finals'] },
  ],
  '2025': [
    { label: "'25 S1",  events: ['owcs_2025_emea_s1','owcs_2025_na_s1','owcs_2025_asia_s1_korea','owcs_2025_asia_s1_japan','owcs_2025_asia_s1_pacific','owcs_2025_china_s1','owcs_2025_asia_s1_main'] },
    { label: "'25 Mid", events: ['owcs_2025_midseason'] },
    { label: "'25 S2",  events: ['owcs_2025_emea_s2','owcs_2025_na_s2','owcs_2025_asia_s2_korea','owcs_2025_asia_s2_japan','owcs_2025_asia_s2_pacific','owcs_2025_china_s2','owcs_2025_apac_championship'] },
    { label: "'25 S3",  events: ['owcs_2025_emea_s3','owcs_2025_na_s3','owcs_2025_asia_s3_korea','owcs_2025_asia_s3_japan','owcs_2025_asia_s3_pacific','owcs_2025_china_s3','owcs_2025_korea_road_to_wf'] },
    { label: "'25 CC",  events: ['owcs_2025_champions_clash'] },
    { label: "'25 WF",  events: ['owcs_2025_world_finals'] },
  ],
  '2026': [
    { label: 'S1', events: ['owcs_2026_na_s1','owcs_2026_emea_s1','owcs_2026_asia_s1_korea','owcs_2026_asia_s1_japan','owcs_2026_asia_s1_pacific','owcs_2026_china_s1','owcs_2026_na_s1_playoffs','owcs_2026_emea_s1_playoffs','owcs_2026_asia_s1_korea_playoffs','owcs_2026_asia_s1_japan_playoffs','owcs_2026_asia_s1_pacific_playoffs','owcs_2026_china_s1_playoffs','owcs_2026_asia_s1_main'] },
  ],
};

// Slug overrides where slugify(name) != actual filename
const LOGO_SLUG_OVERRIDES = {
  "Tokyo Ta1yo's": 'tokyo-ta1yos',
};
// Extension overrides (default .png)
const LOGO_EXT_MAP = {
  'cheeseburger': 'webp', 'jd-gaming': 'webp', 'naive-piggy': 'webp',
  'new-era': 'webp', 'please-not-hero-ban': 'webp', 'zan-esports': 'webp',
  'team-falcons': 'svg', 'poker-face': 'svg', 'the-gatos-guapos': 'svg',
};

function slugify(name) {
  return String(name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function teamLogoImg(teamName, size) {
  size = size || 52;
  const slug = LOGO_SLUG_OVERRIDES[teamName] || slugify(teamName);
  const ext = LOGO_EXT_MAP[slug] || 'png';
  const src = 'ban-calc/assets/teams/' + slug + '.' + ext;
  const initials = teamName.replace(/[^A-Za-z0-9 ]/g, '').split(/\s+/).filter(Boolean).map(w => w[0]).join('').slice(0, 2).toUpperCase() || '?';
  const hue = [...teamName].reduce((h, c) => (h * 31 + c.charCodeAt(0)) & 0xffff, 0) % 360;
  const fb = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '"><circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + (size/2) + '" fill="hsl(' + hue + ',55%,35%)"/><text x="50%" y="50%" dy=".35em" text-anchor="middle" font-size="' + Math.round(size*0.36) + '" font-weight="700" fill="white" font-family="sans-serif">' + initials + '</text></svg>');
  return '<img class="team-logo-img" src="' + src + '" width="' + size + '" height="' + size + '" alt="" onerror="this.onerror=null;this.src=\'' + fb + '\'" loading="lazy">';
}

// Human-readable labels for every event ID
const EVENT_LABELS = {
  // 2024
  'ewc_2024':                       "'24 EWC",
  'owcs_2024_asia_s1_japan':        "'24 Asia S1 Japan",
  'owcs_2024_asia_s1_korea':        "'24 Asia S1 Korea",
  'owcs_2024_asia_s1_pacific':      "'24 Asia S1 Pacific",
  'owcs_2024_asia_s1_wildcard':     "'24 Asia S1 WC",
  'owcs_2024_asia_s1_main':         "'24 Asia S1 Main",
  'owcs_2024_asia_s2_japan':        "'24 Asia S2 Japan",
  'owcs_2024_asia_s2_korea':        "'24 Asia S2 Korea",
  'owcs_2024_asia_s2_pacific':      "'24 Asia S2 Pacific",
  'owcs_2024_asia_s2_wildcard':     "'24 Asia S2 WC",
  'owcs_2024_asia_s2_main':         "'24 Asia S2 Main",
  'owcs_2024_dallas_major':         "'24 Dallas Major",
  'owcs_2024_emea_s1_groups':       "'24 EMEA S1 Grp",
  'owcs_2024_emea_s1_main':         "'24 EMEA S1",
  'owcs_2024_emea_s2_groups':       "'24 EMEA S2 Grp",
  'owcs_2024_emea_s2_main':         "'24 EMEA S2",
  'owcs_2024_emea_s3_groups':       "'24 EMEA S3 Grp",
  'owcs_2024_emea_s3_main':         "'24 EMEA S3",
  'owcs_2024_emea_s4_groups':       "'24 EMEA S4 Grp",
  'owcs_2024_emea_s4_main':         "'24 EMEA S4",
  'owcs_2024_na_s1_groups':         "'24 NA S1 Grp",
  'owcs_2024_na_s1_main':           "'24 NA S1",
  'owcs_2024_na_s2_groups':         "'24 NA S2 Grp",
  'owcs_2024_na_s2_main':           "'24 NA S2",
  'owcs_2024_na_s3_groups':         "'24 NA S3 Grp",
  'owcs_2024_na_s3_main':           "'24 NA S3",
  'owcs_2024_na_s4_groups':         "'24 NA S4 Grp",
  'owcs_2024_na_s4_main':           "'24 NA S4",
  'owcs_2024_world_finals':         "'24 World Finals",
  // 2025
  'owcs_2025_asia_s1_japan':        "'25 Asia S1 Japan",
  'owcs_2025_asia_s1_korea':        "'25 Asia S1 Korea",
  'owcs_2025_asia_s1_pacific':      "'25 Asia S1 Pacific",
  'owcs_2025_asia_s1_main':         "'25 Asia S1 Main",
  'owcs_2025_midseason':            "'25 Midseason",
  'owcs_2025_asia_s2_japan':        "'25 Asia S2 Japan",
  'owcs_2025_asia_s2_korea':        "'25 Asia S2 Korea",
  'owcs_2025_asia_s2_pacific':      "'25 Asia S2 Pacific",
  'owcs_2025_apac_championship':    "'25 APAC Champ.",
  'owcs_2025_asia_s3_japan':        "'25 Asia S3 Japan",
  'owcs_2025_asia_s3_korea':        "'25 Asia S3 Korea",
  'owcs_2025_asia_s3_pacific':      "'25 Asia S3 Pacific",
  'owcs_2025_china_s1':             "'25 China S1",
  'owcs_2025_china_s2':             "'25 China S2",
  'owcs_2025_china_s3':             "'25 China S3",
  'owcs_2025_emea_s1':              "'25 EMEA S1",
  'owcs_2025_emea_s2':              "'25 EMEA S2",
  'owcs_2025_emea_s3':              "'25 EMEA S3",
  'owcs_2025_korea_road_to_wf':     "'25 KR Road to WF",
  'owcs_2025_champions_clash':      "'25 Champions Clash",
  'owcs_2025_na_s1':                "'25 NA S1",
  'owcs_2025_na_s2':                "'25 NA S2",
  'owcs_2025_na_s3':                "'25 NA S3",
  'owcs_2025_world_finals':         "'25 World Finals",
  // 2026
  'owcs_2026_na_s1':                "'26 NA S1",
  'owcs_2026_na_s1_playoffs':       "'26 NA S1 PO",
  'owcs_2026_emea_s1':              "'26 EMEA S1",
  'owcs_2026_emea_s1_playoffs':     "'26 EMEA S1 PO",
  'owcs_2026_china_s1':             "'26 China S1",
  'owcs_2026_china_s1_playoffs':    "'26 China S1 PO",
  'owcs_2026_asia_s1_pacific':      "'26 Asia S1 Pacific",
  'owcs_2026_asia_s1_pacific_playoffs': "'26 Pacific PO",
  'owcs_2026_asia_s1_japan':        "'26 Asia S1 Japan",
  'owcs_2026_asia_s1_japan_playoffs': "'26 Japan PO",
  'owcs_2026_asia_s1_korea':        "'26 Asia S1 Korea",
  'owcs_2026_asia_s1_korea_playoffs': "'26 Korea PO",
  'owcs_2026_asia_s1_main':         "'26 Asia S1 Main",
};

function eventLabel(id) {
  return EVENT_LABELS[id] || id;
}

let allRankings = {};
let playerStats = [];
let banSummary  = [];
let eloHistory  = {};
let teamMeta    = {};

let selectedYear   = '2026';
let selectedRegion = 'All';
let selectedTeam   = null;
let trendChart     = null;

async function loadData() {
  const [r, ps, bs, h] = await Promise.all([
    fetch('assets/data/elo_rankings.json').then(r=>r.json()),
    fetch('assets/data/player_stats.json').then(r=>r.json()),
    fetch('assets/data/ban_summary.json').then(r=>r.json()),
    fetch('assets/data/elo_history.json').then(r=>r.json()),
  ]);
  allRankings = r; playerStats = ps; banSummary = bs; eloHistory = h;
  buildTeamMeta();

  const params = new URLSearchParams(location.search);
  const yp = params.get('year');
  const rp = params.get('region');
  const tp = params.get('team');
  if (yp && ['2024','2025','2026'].includes(yp)) selectedYear = yp;
  if (rp) selectedRegion = rp;
  if (tp && teamMeta[tp]) selectedTeam = tp;

  buildRegionNav();
  renderNavContent();
  selectedTeam ? renderDetail(selectedTeam) : renderGrid();
}

function buildTeamMeta() {
  for (const [year, rows] of Object.entries(allRankings)) {
    for (const r of rows) {
      if (!teamMeta[r.team]) teamMeta[r.team] = { region: r.region, years: {} };
      teamMeta[r.team].years[year] = { elo: r.elo, rank: r.rank, maps_won: r.maps_won, maps_lost: r.maps_lost, maps_drawn: r.maps_drawn||0, win_pct: r.win_pct };
    }
  }
}

function getYearTeams(year) {
  return Object.entries(teamMeta).filter(([, m]) => m.years[year] && m.region !== 'Intl');
}

function buildRegionNav() {
  document.getElementById('region-nav').addEventListener('click', e => {
    const yearTab = e.target.closest('.year-tab');
    const regionItem = e.target.closest('.region-nav-item');
    if (yearTab && yearTab.dataset.year !== selectedYear) {
      selectedYear = yearTab.dataset.year;
      selectedRegion = 'All';
      selectedTeam = null;
      updateURL();
      renderNavContent();
      renderGrid();
    } else if (regionItem) {
      selectedRegion = regionItem.dataset.region;
      selectedTeam = null;
      updateURL();
      renderNavContent();
      renderGrid();
    }
  });
}

function renderNavContent() {
  const counts = {};
  for (const [, m] of getYearTeams(selectedYear)) {
    counts[m.region] = (counts[m.region] || 0) + 1;
  }
  const total = getYearTeams(selectedYear).length;
  const regions = REGION_ORDER.filter(r => counts[r]);

  document.getElementById('region-nav').innerHTML = `
    <div class="year-tabs">
      ${['2026','2025','2024'].map(y => `
        <div class="year-tab${y === selectedYear ? ' active' : ''}" data-year="${y}">${y}</div>
      `).join('')}
    </div>
    <div class="region-nav-header">지역</div>
    <div class="region-nav-item${selectedRegion === 'All' ? ' active' : ''}" data-region="All">
      🌐 All <span class="team-count">${total}</span>
    </div>
    ${regions.map(r => `
      <div class="region-nav-item${selectedRegion === r ? ' active' : ''}" data-region="${r}">
        ${REGION_ICONS[r]||''} ${r} <span class="team-count">${counts[r]}</span>
      </div>
    `).join('')}
  `;
}

/* ── GRID VIEW ── */
function renderGrid() {
  if (trendChart) { trendChart.destroy(); trendChart = null; }

  let teams = getYearTeams(selectedYear);
  if (selectedRegion !== 'All') {
    teams = teams.filter(([, m]) => m.region === selectedRegion);
  }
  teams = teams.map(([name, m]) => ({
    name, region: m.region, years: m.years, d: m.years[selectedYear],
  })).sort((a, b) => b.d.elo - a.d.elo);

  if (selectedRegion === 'All') {
    const grouped = {};
    for (const t of teams) {
      if (!grouped[t.region]) grouped[t.region] = [];
      grouped[t.region].push(t);
    }
    const orderedRegions = REGION_ORDER.filter(r => grouped[r]);
    document.getElementById('main-area').innerHTML = orderedRegions.map(region => `
      <div class="region-section-title">
        ${REGION_ICONS[region]||''} ${region}
        <span style="font-weight:400;font-size:11px;">${grouped[region].length} teams</span>
      </div>
      <div class="team-grid" style="margin-top:0;">
        ${grouped[region].map(t => teamCard(t)).join('')}
      </div>
    `).join('');
  } else {
    document.getElementById('main-area').innerHTML = `
      <div class="team-grid">${teams.map(t => teamCard(t)).join('')}</div>
    `;
  }

  document.getElementById('main-area').addEventListener('click', e => {
    const card = e.target.closest('.team-card');
    if (!card) return;
    selectedTeam = card.dataset.team;
    updateURL();
    renderDetail(selectedTeam);
  });
}

function teamCard(t) {
  const allYears = Object.keys(t.years).sort();
  return `
    <div class="team-card" data-team="${t.name.replace(/"/g,'&quot;')}">
      <div class="card-logo">${teamLogoImg(t.name, 52)}</div>
      <div class="card-name">${t.name}</div>
      <div class="card-elo">${t.d.elo}</div>
      <div class="card-rank">#${t.d.rank} · ${selectedYear}</div>
      <div class="card-record">${t.d.maps_won}W / ${t.d.maps_lost}L · ${t.d.win_pct}%</div>
      <div class="card-seasons">${allYears.map(y=>`<span class="season-pip">${y}</span>`).join('')}</div>
    </div>
  `;
}

/* ── DETAIL VIEW ── */
function renderDetail(teamName) {
  const meta = teamMeta[teamName];
  if (!meta) return;

  const years = Object.keys(meta.years).sort();
  const latestYear = years[years.length - 1];
  const d = meta.years[latestYear];
  const roster = playerStats.filter(p => p.team === teamName);
  const teamBans = banSummary.filter(b => b.team === teamName);

  const bansMade = {}, bansReceived = {};
  for (const b of teamBans) {
    bansMade[b.hero] = (bansMade[b.hero]||0) + b.bans_made;
    bansReceived[b.hero] = (bansReceived[b.hero]||0) + b.bans_received;
  }
  const topMade = Object.entries(bansMade).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const topReceived = Object.entries(bansReceived).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxMade = topMade[0]?.[1]||1;
  const maxReceived = topReceived[0]?.[1]||1;
  const history = eloHistory[teamName]||[];

  document.getElementById('main-area').innerHTML = `
    <div class="detail-back" id="back-btn">← ${selectedYear} ${selectedRegion === 'All' ? '전체' : selectedRegion} 목록으로</div>

    <div class="team-header-bar">
      <div>${teamLogoImg(teamName, 56).replace('class="team-logo-img"', 'class="team-header-logo"')}</div>
      <div class="team-header-info" style="flex:1;min-width:0;">
        <h2>${teamName}</h2>
        <span class="region-badge region-${(meta.region||'').replace(/\s+/g,'')}">${meta.region}</span>
        <div class="season-elo-badges">
          ${years.map(y => `
            <div class="season-elo-badge">
              <span class="yr">${y}</span>
              <span class="elo">${meta.years[y].elo}</span>
              <span class="rank">#${meta.years[y].rank} · ${meta.years[y].win_pct}%</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="detail-grid">
      <div class="panel" style="padding:0;">
        <div class="panel-title">시즌 기록 (${latestYear})</div>
        <div class="stat-row"><span class="lbl">ELO</span><span class="val" style="color:var(--accent)">${d.elo}</span></div>
        <div class="stat-row"><span class="lbl">랭킹</span><span class="val">#${d.rank}</span></div>
        <div class="stat-row"><span class="lbl">승 / 패</span><span class="val">${d.maps_won}W / ${d.maps_lost}L</span></div>
        <div class="stat-row"><span class="lbl">승률</span><span class="val">${d.win_pct}%</span></div>
      </div>

      ${roster.length > 0 ? `
      <div class="panel" style="padding:0;">
        <div class="panel-title">로스터</div>
        <table class="roster-table">
          <thead><tr><th>플레이어</th><th>포지션</th><th>게임</th><th>K/D</th></tr></thead>
          <tbody>
            ${roster.map(p=>`
              <tr>
                <td style="font-weight:600">${p.player}</td>
                <td><span class="role-badge role-${p.role}">${p.role}</span></td>
                <td>${p.games}</td>
                <td>${p.ed_ratio}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      ` : `<div class="panel" style="padding:16px;color:var(--text-dim);font-size:13px;">선수 데이터 없음</div>`}
    </div>

    ${history.length > 0 ? `
    <div class="panel" style="padding:0;margin-bottom:16px;">
      <div class="panel-title">
        ELO 추이 — 첫 등장부터 현재까지
        <span style="font-weight:400;margin-left:8px;">
          <span style="color:#4da6ff">■</span> 2024
          <span style="color:#3ddc84;margin-left:6px">■</span> 2025
          <span style="color:#f5a524;margin-left:6px">■</span> 2026
        </span>
      </div>
      <div style="padding:16px;"><div class="chart-container"><canvas id="trend-chart"></canvas></div></div>
    </div>
    ` : ''}

    ${topMade.length > 0 ? `
    <div class="detail-grid">
      <div class="panel" style="padding:0;">
        <div class="panel-title">🔴 많이 밴한 영웅</div>
        ${topMade.map(([h,c])=>`
          <div class="ban-row">
            <span class="ban-hero">${h}</span>
            <div class="ban-bar-wrap"><div class="ban-bar-fill" style="width:${(c/maxMade*100).toFixed(1)}%;background:var(--bad);"></div></div>
            <span class="ban-count">${c}</span>
          </div>
        `).join('')}
      </div>
      <div class="panel" style="padding:0;">
        <div class="panel-title">🛡️ 많이 당한 밴</div>
        ${topReceived.map(([h,c])=>`
          <div class="ban-row">
            <span class="ban-hero">${h}</span>
            <div class="ban-bar-wrap"><div class="ban-bar-fill" style="width:${(c/maxReceived*100).toFixed(1)}%;background:var(--accent2);"></div></div>
            <span class="ban-count">${c}</span>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}
  `;

  document.getElementById('back-btn').addEventListener('click', () => {
    selectedTeam = null;
    updateURL();
    renderGrid();
  });

  if (history.length > 0) renderTrendChart(history, teamName);
}

function renderTrendChart(history, teamName) {
  const ctx = document.getElementById('trend-chart');
  if (!ctx) return;
  if (trendChart) trendChart.destroy();

  // Show ALL stages on x-axis. Stages the team participated in get a dot;
  // stages they skipped get a forward-filled flat line with NO dot —
  // making it visually obvious which tournaments they didn't attend.
  const allStages = [
    ...STAGE_GROUPS['2024'],
    ...STAGE_GROUPS['2025'],
    ...STAGE_GROUPS['2026'],
  ];
  const eventElo  = {}, eventYear = {};
  for (const pt of history) { eventElo[pt.event] = pt.elo; eventYear[pt.event] = pt.year; }

  // Build raw stage values (null = not participated)
  const raw = allStages.map(stage => {
    let elo = null, year = null;
    for (const ev of stage.events) {
      if (eventElo[ev] !== undefined) { elo = eventElo[ev]; year = eventYear[ev]; }
    }
    return { label: stage.label, elo, year };
  });

  if (raw.every(d => d.elo === null)) return;

  // Forward-fill nulls: flat horizontal line for skipped stages, no dot
  const yearColors  = { '2024': '#4da6ff', '2025': '#3ddc84', '2026': '#f5a524' };
  const labels      = raw.map(d => d.label);
  const filledData  = [], isReal = [], pointColors = [];
  let lastElo = null, lastYear = null;

  for (const d of raw) {
    if (d.elo !== null) {
      filledData.push(d.elo);  isReal.push(true);
      pointColors.push(yearColors[d.year] || '#f5a524');
      lastElo = d.elo;  lastYear = d.year;
    } else if (lastElo !== null) {
      filledData.push(lastElo); isReal.push(false);
      pointColors.push(yearColors[lastYear] || '#7a9bb5');
    } else {
      filledData.push(null);    isReal.push(false);
      pointColors.push('#7a9bb5');
    }
  }

  // Tooltip: only show meaningful info for real participation stages
  const realStageMap = {};
  for (const d of raw) if (d.elo !== null) realStageMap[d.label] = d;

  trendChart = new Chart(ctx.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: teamName,
        data: filledData,
        borderColor: '#f5a524',
        backgroundColor: 'rgba(245,165,36,0.06)',
        fill: true,
        borderWidth: 2,
        pointRadius: isReal.map(r => r ? 5 : 0),
        pointHoverRadius: isReal.map(r => r ? 7 : 3),
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        tension: 0,
        spanGaps: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => labels[items[0].dataIndex],
            label: item => {
              const idx = item.dataIndex;
              if (!isReal[idx]) return '미출전 (ELO 유지)';
              const d = raw[idx];
              return [`ELO: ${d.elo}`, `Year: ${d.year}`];
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#7a9bb5', font: { size: 10 },
            maxRotation: 45, minRotation: 30,
          },
          grid: { color: '#1a3a5c' }
        },
        y: { ticks: { color: '#7a9bb5', font: { size: 10 } }, grid: { color: '#1a3a5c' } }
      }
    }
  });
}

function updateURL() {
  const url = new URL(location.href);
  if (selectedTeam) url.searchParams.set('team', selectedTeam);
  else url.searchParams.delete('team');
  if (selectedRegion && selectedRegion !== 'All') url.searchParams.set('region', selectedRegion);
  else url.searchParams.delete('region');
  if (selectedYear && selectedYear !== '2026') url.searchParams.set('year', selectedYear);
  else url.searchParams.delete('year');
  history.replaceState({}, '', url);
}

loadData();
</script>
