<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OWCStats — Overwatch Champions Series Analytics</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.page { max-width: 1000px; margin: 0 auto; padding: 20px 16px 60px; }
.feed-head { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
.feed-head h1 { font-size: 22px; font-weight: 800; }
.feed-head .sub { font-size: 12px; color: var(--text-dim); }

/* ELO Top5 스트립 (구 홈에서 계승) */
.top5-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
@media (max-width: 700px) { .top5-strip { grid-template-columns: repeat(5, 1fr); gap: 5px; } }
.strip-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 6px; text-align: center; min-width: 0; }
.strip-rank { font-size: 10px; color: var(--text-dim); }
.strip-team { font-size: 11px; font-weight: 700; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.strip-elo { font-size: 14px; font-weight: 800; color: var(--accent); }

/* 필터 칩 */
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.chips button {
  background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
  color: var(--text-dim); font-size: 12px; padding: 5px 12px; cursor: pointer;
}
.chips button.active { background: var(--panel2); color: var(--accent); border-color: var(--accent); }

/* 경기 카드 */
.date-head { font-size: 12px; font-weight: 700; color: var(--text-dim); margin: 18px 0 8px; letter-spacing: 0.5px; }
.match-card {
  display: grid; grid-template-columns: minmax(72px, auto) 1fr; gap: 12px; align-items: center;
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 14px; margin-bottom: 8px; text-decoration: none; color: inherit;
  transition: border-color 0.15s;
}
.match-card:hover { border-color: var(--accent); }
.mc-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.mc-region { font-size: 10px; font-weight: 700; color: var(--accent2); }
.mc-phase { font-size: 10px; color: var(--text-dim); line-height: 1.3; }
.mc-cov { font-size: 9px; color: var(--text-dim); }
.mc-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
.mc-team { display: flex; align-items: center; gap: 8px; min-width: 0; font-size: 13px; font-weight: 600; }
.mc-team.right { flex-direction: row-reverse; text-align: right; }
.mc-team span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mc-team.loser { color: var(--text-dim); font-weight: 500; }
.mc-score { font-size: 15px; font-weight: 800; white-space: nowrap; }
.mc-score .w { color: var(--accent); }
.mc-score .s { color: var(--text-dim); padding: 0 4px; }
.feed-empty { color: var(--text-dim); padding: 30px; text-align: center; }
@media (max-width: 560px) {
  .match-card { grid-template-columns: 1fr; gap: 6px; }
  .mc-left { flex-direction: row; align-items: baseline; gap: 8px; }
}
</style>
</head>
<body>
<script src="assets/i18n.js"></script>
<script src="assets/nav.js?v=20260708c"></script>
<script src="assets/team-logos.js?v=20260708c"></script>

<div class="page">
  <div class="feed-head">
    <h1>OWCS 2026 Matches</h1>
    <span class="sub">경기를 클릭하면 맵·밴·선수 스탯 상세를 볼 수 있습니다</span>
  </div>

  <div class="top5-strip" id="top5-strip"></div>

  <div class="chips" id="region-chips"></div>
  <div class="chips" id="stage-chips"></div>

  <div id="feed"><div class="feed-empty">Loading...</div></div>
</div>

<script>
const state = { region: 'All', stage: 'All', matches: [] };

const REGIONS = ['All', 'Korea', 'NA', 'EMEA', 'Japan', 'Pacific', 'China', 'INTL'];

async function boot() {
  try {
    const res = await fetch(`assets/data/matches_index.json?v=${window.DATA_V||'0'}`);
    state.matches = await res.json();
  } catch (e) {
    document.getElementById('feed').innerHTML = '<div class="feed-empty">경기 데이터를 불러오지 못했습니다.</div>';
    return;
  }
  buildChips();
  renderFeed();
  loadTop5();
}

function buildChips() {
  const stages = ['All', ...new Set(state.matches.map(m => m.stage))];
  const mk = (el, items, key) => {
    el.innerHTML = items.map(v => `<button data-v="${v}" class="${v === 'All' ? 'active' : ''}">${v}</button>`).join('');
    el.addEventListener('click', e => {
      const btn = e.target.closest('button'); if (!btn) return;
      state[key] = btn.dataset.v;
      el.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
      renderFeed();
    });
  };
  mk(document.getElementById('region-chips'), REGIONS, 'region');
  mk(document.getElementById('stage-chips'), stages, 'stage');
}

function renderFeed() {
  const list = state.matches.filter(m =>
    (state.region === 'All' || m.region === state.region) &&
    (state.stage === 'All' || m.stage === state.stage));
  if (!list.length) {
    document.getElementById('feed').innerHTML = '<div class="feed-empty">해당 조건의 경기가 없습니다.</div>';
    return;
  }
  let html = '', lastDate = '';
  for (const m of list) {
    if (m.date !== lastDate) {
      lastDate = m.date;
      html += `<div class="date-head">${m.date}</div>`;
    }
    const cov = [m.coverage.stats ? '📊 stats' : '', m.coverage.bans ? '🚫 bans' : ''].filter(Boolean).join(' · ');
    html += `
      <a class="match-card" href="match.html?m=${m.id}">
        <div class="mc-left">
          <span class="mc-region">${m.region}</span>
          <span class="mc-phase">${m.stage}${m.phase ? ' · ' + m.phase : ''}</span>
          ${cov ? `<span class="mc-cov">${cov}</span>` : ''}
        </div>
        <div class="mc-teams">
          <div class="mc-team ${m.winner === 2 ? 'loser' : ''}">${teamLogoImg(m.team1, 26)}<span>${m.team1}</span></div>
          <div class="mc-score"><span class="${m.winner === 1 ? 'w' : ''}">${m.score1}</span><span class="s">:</span><span class="${m.winner === 2 ? 'w' : ''}">${m.score2}</span></div>
          <div class="mc-team right ${m.winner === 1 ? 'loser' : ''}">${teamLogoImg(m.team2, 26)}<span>${m.team2}</span></div>
        </div>
      </a>`;
  }
  document.getElementById('feed').innerHTML = html;
}

async function loadTop5() {
  try {
    const res = await fetch(`assets/data/elo_rankings.json?v=${window.DATA_V||'0'}`);
    const data = await res.json();
    const top5 = (data['2026'] || []).slice(0, 5);
    const MEDALS = ['🥇', '🥈', '🥉', '4', '5'];
    document.getElementById('top5-strip').innerHTML = top5.map((t, i) => `
      <div class="strip-card">
        <div class="strip-rank">${MEDALS[i]}</div>
        <div class="strip-team" title="${t.team}">${t.team}</div>
        <div class="strip-elo">${t.elo}</div>
      </div>`).join('') +
      `<div style="grid-column:1/-1;text-align:right"><a href="elo.html" style="font-size:11px;color:var(--accent2);text-decoration:none">2026 Global ELO — 전체 순위 →</a></div>`;
  } catch (e) { /* Top5는 부가 위젯 — 실패해도 피드는 유지 */ }
}

boot();
</script>
</body>
</html>
